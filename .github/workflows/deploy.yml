name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Convert blog posts to terminal theme
        run: node convert-posts.js

      - name: Prepare deployment directory
        run: |
          mkdir -p deploy
          # Copy static files
          cp index.html deploy/
          cp about.html deploy/
          cp resume.html deploy/
          cp styles.css deploy/
          cp script.js deploy/
          cp favicon.svg deploy/
          cp favicon.ico deploy/
          cp resume.pdf deploy/
          cp CNAME deploy/
          cp .nojekyll deploy/
          # Copy SEO and metadata files
          cp robots.txt deploy/
          cp sitemap.xml deploy/
          cp posts-metadata.json deploy/
          # Copy generated posts directory
          cp -r posts deploy/
          # Copy images directory
          cp -r img deploy/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
